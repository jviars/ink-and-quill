name: 'Release Tauri Apps'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    name: Publish (${{ matrix.label }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-universal-installer
            mode: tauri-action
            macos_target: universal-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles dmg
          - platform: macos-latest
            label: macos-universal-portable
            mode: portable-manual
            macos_target: universal-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles app
          - platform: macos-latest
            label: macos-aarch64-installer
            mode: tauri-action
            macos_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            label: macos-aarch64-portable
            mode: portable-manual
            macos_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles app
          - platform: ubuntu-22.04
            label: linux-x64
            mode: tauri-action
            tauri_args: ""
          - platform: windows-latest
            label: windows-installer
            mode: tauri-action
            tauri_args: --bundles nsis
          - platform: windows-latest
            label: windows-portable
            mode: portable-manual
            tauri_args: --bundles none

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust Targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Ubuntu Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Derive Release Metadata
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Missing github.ref_name"
          }

          $rawVersion = $tag.TrimStart('v')
          if ($rawVersion -notmatch '^(?<major>\d+)\.(?<minor>\d+)(?:\.(?<patch>\d+))?(?:-(?<prerelease>[0-9A-Za-z\.-]+))?$') {
            throw "Tag '$tag' must match vMAJOR.MINOR[.PATCH][-PRERELEASE]"
          }

          $major = $Matches.major
          $minor = $Matches.minor
          $patch = if ($Matches.patch) { $Matches.patch } else { "0" }
          $prerelease = $Matches.prerelease
          $coreVersion = "$major.$minor.$patch"

          # MSI on Windows cannot use alpha labels like '-beta'; enforce a safe numeric app version.
          $buildVersion = if ("${{ matrix.platform }}" -eq "windows-latest") {
            $coreVersion
          } else {
            if ([string]::IsNullOrWhiteSpace($prerelease)) {
              $coreVersion
            } else {
              "$coreVersion-$prerelease"
            }
          }

          "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "build_version=$buildVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "release_name=${{ github.event.repository.name }} $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Apply Build Version to Manifests
        shell: pwsh
        env:
          BUILD_VERSION: ${{ steps.release_meta.outputs.build_version }}
        run: |
          $script = @'
          const fs = require("fs");
          const version = process.env.BUILD_VERSION;
          if (!version) {
            throw new Error("BUILD_VERSION is missing");
          }

          const pkgPath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");

          const tauriPath = "src-tauri/tauri.conf.json";
          const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          tauri.package.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + "\n");

          const cargoPath = "src-tauri/Cargo.toml";
          let cargo = fs.readFileSync(cargoPath, "utf8");
          cargo = cargo.replace(/^version\s*=\s*"[^"]+"/m, 'version = "' + version + '"');
          fs.writeFileSync(cargoPath, cargo);

          console.log(`Applied build version ${version} for CI packaging.`);
          '@
          node -e $script

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Reliability Checks
        run: pnpm run test:stabilization

      - name: Build and Release
        if: matrix.mode == 'tauri-action'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri_args }}
          tagName: ${{ steps.release_meta.outputs.tag_name }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: ${{ contains(steps.release_meta.outputs.tag_name, '-') }}

      - name: Build Portable Target
        if: matrix.mode == 'portable-manual'
        run: pnpm tauri build ${{ matrix.tauri_args }}

      - name: Package Windows Portable
        id: package_windows_portable
        if: matrix.label == 'windows-portable'
        shell: pwsh
        env:
          BUILD_VERSION: ${{ steps.release_meta.outputs.build_version }}
          MATRIX_LABEL: ${{ matrix.label }}
        run: |
          New-Item -Path dist/portable -ItemType Directory -Force | Out-Null
          $asset = "dist/portable/Ink-and-Quill_$env:BUILD_VERSION`_$env:MATRIX_LABEL.zip"

          $roots = @("src-tauri/target/release", "target/release")
          $exeCandidates = @()

          foreach ($root in $roots) {
            if (Test-Path $root) {
              $exeCandidates += Get-ChildItem -Path $root -Filter "*.exe" -File -ErrorAction SilentlyContinue
            }
          }

          if (-not $exeCandidates) {
            foreach ($root in @("src-tauri/target", "target")) {
              if (Test-Path $root) {
                $exeCandidates += Get-ChildItem -Path $root -Filter "*.exe" -File -Recurse -ErrorAction SilentlyContinue |
                  Where-Object {
                    $_.FullName -match '[\\/]release[\\/]' -and
                    $_.FullName -notmatch '[\\/](deps|build|\.fingerprint|bundle|examples|incremental)[\\/]'
                  }
              }
            }
          }

          $exeCandidates = $exeCandidates | Sort-Object FullName -Unique
          if (-not $exeCandidates) {
            Write-Host "Unable to locate a release .exe under src-tauri/target or target. First 300 files:"
            foreach ($root in @("src-tauri/target", "target")) {
              if (Test-Path $root) {
                Write-Host "--- $root ---"
                Get-ChildItem -Path $root -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 300 | ForEach-Object { $_.FullName }
              }
            }
            throw "Portable executable not found under expected release output folders"
          }

          $preferred = $exeCandidates | Where-Object { $_.Name -match '(?i)(ink|quill)' } | Sort-Object LastWriteTime -Descending
          $exePath = if ($preferred) {
            $preferred[0].FullName
          } else {
            ($exeCandidates | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          }

          Write-Host "Using executable: $exePath"
          Compress-Archive -Path $exePath -DestinationPath $asset -Force
          "asset_path=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package macOS Portable
        id: package_macos_portable
        if: startsWith(matrix.label, 'macos-') && endsWith(matrix.label, '-portable')
        shell: bash
        env:
          BUILD_VERSION: ${{ steps.release_meta.outputs.build_version }}
          MATRIX_LABEL: ${{ matrix.label }}
          MACOS_TARGET: ${{ matrix.macos_target }}
        run: |
          mkdir -p dist/portable
          APP_PATH="src-tauri/target/$MACOS_TARGET/release/bundle/macos/Ink and Quill.app"
          ASSET_PATH="dist/portable/Ink-and-Quill_${BUILD_VERSION}_${MATRIX_LABEL}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ASSET_PATH"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Portable Artifact to Release
        if: matrix.mode == 'portable-manual'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body: 'See the assets to download this version and install.'
          draft: true
          prerelease: ${{ contains(steps.release_meta.outputs.tag_name, '-') }}
          files: ${{ steps.package_windows_portable.outputs.asset_path || steps.package_macos_portable.outputs.asset_path }}
          fail_on_unmatched_files: true
